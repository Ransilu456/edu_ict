<div class="course-left">
  <div class="progress-bar-container">
    <button class="close-lesson" onclick="location.reload()" title="Exit Lesson">&times;</button>
    <div class="progress-track" id="course-progress"></div>
    <select id="lesson-select" class="lesson-select" title="Jump to Lesson"></select>
    <div class="energy-badge" title="XP Points">
      <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      <span id="score-count">0</span> XP
    </div>
  </div>

  <div class="lesson-card">
    <h2 class="lesson-title" id="lesson-title">Loading Lesson…</h2>
    <div class="lesson-text" id="lesson-text">Please wait while the course materials load…</div>
    <div class="quiz-options" id="quiz-options"></div>
    <div class="feedback-alert" id="quiz-feedback"></div>
    <div class="course-footer">
      <button class="btn-primary" id="cta-btn" disabled>Check Answer</button>
    </div>
  </div>
</div>

<div class="course-right" id="course-sim-container"></div>
